    <line class="rowLine" x1="1356" y1="572" x2="1694" y2="572"/>
    <line class="rowLine" x1="1356" y1="603" x2="1694" y2="603"/>
    <line class="rowLine" x1="1356" y1="634" x2="1694" y2="634"/>
    <rect class="pk" x="1356" y="483" width="38" height="22" rx="6"/>
    <text class="chipText" x="1375" y="499" text-anchor="middle">PK</text>
    <text class="field" x="1410" y="500">prize_id</text>
    <rect class="fk" x="1356" y="514" width="38" height="22" rx="6"/>
    <text class="chipText" x="1375" y="530" text-anchor="middle">FK</text>
    <text class="field" x="1410" y="531">tournament_id</text>
    <rect class="fk" x="1356" y="545" width="38" height="22" rx="6"/>
    <text class="chipText" x="1375" y="561" text-anchor="middle">FK</text>
    <text class="field" x="1410" y="562">team_id</text>
    <text class="field" x="1356" y="593">position</text>
    <text class="field" x="1356" y="624">prize_title</text>
    <text class="field" x="1356" y="655">prize_amount</text>
  </g>

  <!-- tbl_Registeration -->
  <g filter="url(#shadow)">
    <rect class="panel" x="740" y="815" width="420" height="220" rx="8"/>
    <rect class="header" x="740" y="815" width="420" height="46" rx="8"/>
    <rect class="header" x="740" y="843" width="420" height="18"/>
    <text class="headerText" x="766" y="845">tbl_Registeration</text>
    <line class="rowLine" x1="766" y1="905" x2="1134" y2="905"/>
