    <rect class="header" x="740" y="420" width="420" height="46" rx="8"/>
    <rect class="header" x="740" y="448" width="420" height="18"/>
    <text class="headerText" x="766" y="450">tbl_Tournaments</text>
    <line class="rowLine" x1="766" y1="510" x2="1134" y2="510"/>
    <line class="rowLine" x1="766" y1="541" x2="1134" y2="541"/>
    <line class="rowLine" x1="766" y1="572" x2="1134" y2="572"/>
    <line class="rowLine" x1="766" y1="603" x2="1134" y2="603"/>
    <line class="rowLine" x1="766" y1="634" x2="1134" y2="634"/>
    <rect class="pk" x="766" y="483" width="38" height="22" rx="6"/>
    <text class="chipText" x="785" y="499" text-anchor="middle">PK</text>
    <text class="field" x="820" y="500">tournament_id</text>
    <rect class="fk" x="766" y="514" width="38" height="22" rx="6"/>
    <text class="chipText" x="785" y="530" text-anchor="middle">FK</text>
    <text class="field" x="820" y="531">game_id</text>
    <text class="field" x="766" y="562">title</text>
    <text class="field" x="766" y="593">start_date</text>
    <text class="field" x="766" y="624">end_date</text>
    <text class="field" x="766" y="655">status</text>
  </g>

