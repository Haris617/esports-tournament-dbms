    <text class="field" x="126" y="686">team2_score</text>
    <text class="field" x="126" y="717">played_at</text>
  </g>

  <!-- tbl_Prizes -->
  <g filter="url(#shadow)">
    <rect class="panel" x="1330" y="420" width="390" height="255" rx="8"/>
    <rect class="header" x="1330" y="420" width="390" height="46" rx="8"/>
    <rect class="header" x="1330" y="448" width="390" height="18"/>
